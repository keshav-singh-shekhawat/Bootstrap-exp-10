<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(to right, #4facfe, #00f2fe);
  color: white;
}
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border: none;
  border-radius: 15px;
}
#suggestions {
  z-index: 1000;
}
</style>
</head>

<body>

<div class="container text-center mt-5 position-relative">

  <h2>🌤 Weather Dashboard</h2>

  <div class="input-group my-4">
    <input type="text" id="city" class="form-control" placeholder="Enter city">
    <button class="btn btn-dark" onclick="getWeather()">Search</button>
  </div>

  <!-- Suggestions -->
  <div id="suggestions" class="list-group position-absolute w-100"></div>

  <!-- Weather Card -->
  <div id="weatherCard" class="card p-4 d-none">
    <h3 id="cityName"></h3>
    <h1 id="temp"></h1>
    <p id="condition"></p>
  </div>

</div>

<script>
// WEATHER FUNCTION
async function getWeather() {
  const city = document.getElementById("city").value;

  if (!city) {
    alert("Enter city name");
    return;
  }

  const url = `https://wttr.in/${city}?format=j1`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    document.getElementById("weatherCard").classList.remove("d-none");
    document.getElementById("cityName").innerText = city.toUpperCase();
    document.getElementById("temp").innerText = data.current_condition[0].temp_C + "°C";
    document.getElementById("condition").innerText = data.current_condition[0].weatherDesc[0].value;

  } catch (err) {
    console.log(err);
    alert("Error fetching weather");
  }
}


// SEARCH SUGGESTIONS
const cities = [
  "Delhi","Mumbai","Jaipur","Kolkata","Chennai",
  "Bangalore","Hyderabad","Pune","Ahmedabad","Surat"
];

const input = document.getElementById("city");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", () => {
  const value = input.value.toLowerCase();
  suggestions.innerHTML = "";

  if (!value) return;

  const filtered = cities.filter(city => city.toLowerCase().includes(value));

  filtered.forEach(city => {
    const div = document.createElement("div");
    div.className = "list-group-item list-group-item-action";
    div.innerText = city;

    div.onclick = () => {
      input.value = city;
      suggestions.innerHTML = "";
    };

    suggestions.appendChild(div);
  });
});
</script>

</body>
</html>
